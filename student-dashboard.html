<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | DLSU Advising</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">DLSU Advising</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="student-dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="advising-form.html">Submit Form</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row gap-4">
            
            <section class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h4 class="card-title">My Profile</h4>
                        <p><strong>Name:</strong> <span id="studentName">Loading...</span></p>
                        <p><strong>ID:</strong> <span id="studentIdNum">Loading...</span></p>
                        <p><strong>Program:</strong> <span id="studentProgram">Loading...</span></p>
                    </div>
                </div>
            </section>

            <section class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="card-title mb-1">Current Term Advising</h4>
                            <p class="text-muted mb-0">Status: <span class="badge bg-warning text-dark">Pending Clearance</span></p>
                        </div>
                        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#advisingModal">View Details</button>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <div class="modal fade" id="advisingModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Advising Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Your advising form is currently under review by your professor. Please check back later.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
